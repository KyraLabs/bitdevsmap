name: Aggregate topics

# Git-scraping: fetch recent meeting topics from each community's source and
# publish a fresh topics.json to the unprotected `data` branch. The app fetches
# it at runtime, so main stays untouched (no protected-branch push) and no
# rebuild is needed.
on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: aggregate-topics
  cancel-in-progress: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Aggregate topics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/aggregate-topics.ts

      - name: Stage topics for publish
        run: |
          mkdir -p publish
          cp src/data/topics.json publish/topics.json

      # Force-push a single commit holding just topics.json to the `data` branch
      # (created on first run). Unprotected, so no PR/branch-protection friction.
      - name: Publish to data branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: data
          folder: publish
          commit-message: 'chore: update meeting topics'
          single-commit: true
