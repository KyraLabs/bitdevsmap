name: Aggregate topics

# Git-scraping: fetch recent meeting topics from each community's source and
# auto-commit a fresh src/data/topics.json.
on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: aggregate-topics
  cancel-in-progress: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Aggregate topics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/aggregate-topics.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/data/topics.json)" ]]; then
            git add src/data/topics.json
            git commit -m "chore: update meeting topics"
            git push
          else
            echo "No topic changes"
          fi
